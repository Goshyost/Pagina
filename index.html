<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pares Químicos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pares Químicos</h1>
    <p>Empareja el <strong>Símbolo</strong> con su <strong>Nombre</strong>.</p>
</header>

<main>
    <div class="game-board" id="board"></div>
    <button id="resetButton" class="reset-btn">Reiniciar Juego</button>
</main>

<!-- POP-UP DE VICTORIA -->
<div class="modal-overlay" id="winModal">
    <div class="modal-content">
        <h2>¡Felicidades! 🎉</h2>
        <p>Has encontrado todas las parejas correctamente.</p>
        <button id="modalResetButton" class="modal-btn">Jugar de nuevo</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
