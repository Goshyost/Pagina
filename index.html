<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Pares: Tabla Periódica</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --card-back: #34495e;
            --card-front: #1abc9c;
            --matched: #2ecc71;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
        }

        p {
            font-size: 1.1rem;
            margin: 0;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tablero del juego */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 1vw; /* Cambiado a vw para que el espacio disminuya en celular */
            perspective: 1000px;
            width: 90vw; /* Asegura que el tablero no toque los bordes físicos del teléfono */
            max-width: 500px; /* Evita que se haga gigante en computadoras */
        }

        /* Estilos de las tarjetas */
        .card {
            width: 100%; /* Ocupa el ancho completo de su celda de la cuadrícula */
            aspect-ratio: 3 / 4; /* Mantiene la proporción vertical (ej. 120x160, 90x120) */
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            background-color: var(--matched);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            font-size: 4.5vw; /* Escala el tamaño del texto según el ancho de pantalla */
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
        }

        /* Parte trasera de la tarjeta */
        .card-back {
            background-color: var(--card-back);
            border: 2px solid #7f8c8d;
        }

        .card-back::after {
            content: "?";
            font-size: 3rem;
            color: #7f8c8d;
        }

        /* Parte delantera de la tarjeta */
        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            color: #ffffff;
            flex-direction: column;
        }

        .type-indicator {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Botón de reinicio */
        .reset-btn {
            margin-top: 25px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #e67e22;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pares Químicos</h1>
        <p>Empareja el <strong>Símbolo</strong> con su <strong>Nombre</strong> correspondiente.</p>
    </header>

    <main>
        <div class="game-board" id="board"></div>
        <button id="resetButton" class="reset-btn">Reiniciar Juego</button>
    </main>

    <script>
        // Declaración estricta de variables y datos con const/let
        const elementList = [
            { id: 1, symbol: 'H', name: 'Hidrógeno' },
            { id: 2, symbol: 'O', name: 'Oxígeno' },
            { id: 3, symbol: 'C', name: 'Carbono' },
            { id: 4, symbol: 'N', name: 'Nitrógeno' },
            { id: 5, symbol: 'Au', name: 'Oro' },
            { id: 6, symbol: 'Fe', name: 'Hierro' },
            { id: 7, symbol: 'Na', name: 'Sodio' },
            { id: 8, symbol: 'He', name: 'Helio' }
        ];

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;

        // Función flecha para barajar arreglos (Algoritmo de Fisher-Yates optimizado)
        const shuffle = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        };

        const createBoard = () => {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const cardsData = [];
            elementList.forEach(item => {
                cardsData.push({ id: item.id, text: item.symbol, type: 'Símbolo' });
                cardsData.push({ id: item.id, text: item.name, type: 'Nombre' });
            });

            // Barajado sintácticamente eficiente
            shuffle(cardsData);

            // Inyección limpia de nodos en el DOM
            cardsData.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;
                card.dataset.type = data.type;

                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <div>${data.text}</div>
                        <div class="type-indicator">${data.type}</div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        };

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            checkMatch();
        }

        const checkMatch = () => {
            const isMatch = firstCard.dataset.id === secondCard.dataset.id && 
                            firstCard.dataset.type !== secondCard.dataset.type;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        };

        const disableCards = () => {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            resetTurn();
        };

        const unflipCards = () => {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetTurn();
            }, 1000);
        };

        const resetTurn = () => {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        };

        const resetGame = () => {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            createBoard();
        };

        // Escuchadores de eventos globales asignados correctamente desde JS
        document.getElementById('resetButton').addEventListener('click', resetGame);

        // Inicialización segura del juego al cargar el script
        createBoard();
    </script>
</body>
</html>
